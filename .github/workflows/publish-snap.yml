name: Publish Snap

on:
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch:
    inputs:
      tag:
        description: "Upstream tag to build (default: latest non-prerelease)"
        required: false
      channel:
        description: "Snapcraft channel"
        required: false
        default: "stable"

permissions:
  contents: write

concurrency:
  group: publish-snap
  cancel-in-progress: false

env:
  UPSTREAM_REPO: pear-devs/pear-desktop
  SNAP_STORE_NAME: pear-desktop

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
      channel: ${{ steps.resolve.outputs.channel }}
      should_publish: ${{ steps.dedup.outputs.should_publish }}
    steps:
      - uses: actions/checkout@v5

      - name: Resolve target tag
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_CHANNEL: ${{ inputs.channel }}
        run: |
          set -euo pipefail
          CHANNEL="${INPUT_CHANNEL:-stable}"
          if [[ -n "${INPUT_TAG}" ]]; then
            TAG="${INPUT_TAG}"
          else
            read -r TAG IS_PRE < <(
              gh release view --repo "${UPSTREAM_REPO}" \
                --json tagName,isPrerelease \
                --jq '"\(.tagName) \(.isPrerelease)"'
            )
            if [[ "${IS_PRE}" == "true" ]]; then
              echo "Latest upstream release ${TAG} is a prerelease; refusing to publish." >&2
              exit 1
            fi
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=${TAG} version=${VERSION} channel=${CHANNEL}"

      - name: Check dedup tag
        id: dedup
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          set -euo pipefail
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "Tag ${TAG} already exists in this repo; skipping publish."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${TAG} not found; will build and publish."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-publish:
    needs: detect
    if: needs.detect.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout upstream at tag
        uses: actions/checkout@v5
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: ${{ needs.detect.outputs.tag }}
          path: upstream

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: upstream/pnpm-lock.yaml

      - name: Install snapcraft
        run: sudo snap install snapcraft --classic

      - name: Patch upstream name to pear-desktop
        working-directory: upstream
        run: |
          set -euo pipefail
          jq '.name = "pear-desktop" | .productName = "Pear Desktop"' \
            package.json > package.json.new
          mv package.json.new package.json
          echo "--- package.json (name/productName) ---"
          jq '{name, productName, version}' package.json

      - name: Install dependencies
        working-directory: upstream
        run: pnpm install --frozen-lockfile

      - name: Build app
        working-directory: upstream
        run: pnpm build

      - name: Build snap
        working-directory: upstream
        run: pnpm electron-builder --linux snap -p never

      - name: Locate built snap
        working-directory: upstream
        run: |
          set -euo pipefail
          SNAP_PATH=$(find . -maxdepth 3 -name '*.snap' -type f | head -n1)
          if [[ -z "${SNAP_PATH}" ]]; then
            echo "No .snap produced under upstream/" >&2
            find . -maxdepth 3 -type d | sort
            exit 1
          fi
          echo "SNAP_PATH=upstream/${SNAP_PATH#./}" >> "$GITHUB_ENV"
          echo "Built: ${SNAP_PATH}"

      - name: Verify snap internal name and version
        env:
          EXPECTED_VERSION: ${{ needs.detect.outputs.version }}
        run: |
          set -euo pipefail
          sudo unsquashfs -d /tmp/snap-check "${SNAP_PATH}" meta/snap.yaml
          echo "--- meta/snap.yaml ---"
          cat /tmp/snap-check/meta/snap.yaml
          grep -q '^name: pear-desktop$' /tmp/snap-check/meta/snap.yaml \
            || { echo "Snap internal name is not pear-desktop"; exit 1; }
          grep -q "^version: ${EXPECTED_VERSION}$" /tmp/snap-check/meta/snap.yaml \
            || { echo "Snap version does not match ${EXPECTED_VERSION}"; exit 1; }

      - name: Publish to Snapcraft
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ env.SNAP_PATH }}
          release: ${{ needs.detect.outputs.channel }}

      - name: Push dedup tag to this repo
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.detect.outputs.tag }}
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/git/refs" \
            -f ref="refs/tags/${TAG}" \
            -f sha="${GITHUB_SHA}"

      - name: Job summary
        env:
          TAG: ${{ needs.detect.outputs.tag }}
          VERSION: ${{ needs.detect.outputs.version }}
          CHANNEL: ${{ needs.detect.outputs.channel }}
        run: |
          {
            echo "## Published ${SNAP_STORE_NAME} ${TAG}"
            echo ""
            echo "- **Version:** ${VERSION}"
            echo "- **Channel:** ${CHANNEL}"
            echo "- **Artifact:** \`${SNAP_PATH}\`"
            echo "- **Upstream:** https://github.com/${UPSTREAM_REPO}/releases/tag/${TAG}"
            echo "- **Snapcraft:** https://snapcraft.io/${SNAP_STORE_NAME}"
          } >> "$GITHUB_STEP_SUMMARY"
